<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            {% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{
            site.title }}{% endif %}
        </title>
        <meta
            name="description"
            content="{{ page.description | default: site.description }}"
        />
        <link
            rel="stylesheet"
            href="{{ '/assets/css/style.css' | relative_url }}"
        />
        {% seo %}
    </head>
    <body>
        <header class="site-header">
            <div class="container">
                <a class="site-logo" href="{{ '/' | relative_url }}">
                    <span class="logo-text">AI in Education</span>
                </a>
                <nav class="site-nav">
                    {% for item in site.nav %}
                    <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
                    {% endfor %}
                </nav>
            </div>
        </header>

        <main>{{ content }}</main>

        <footer class="site-footer">
            <div class="container">
                <p>{{ site.footer.text }}</p>
            </div>
        </footer>
    </body>
</html>
